  <script type="text/babel">
    (function() {
      var FADE_MS = 500;
      var FADE_OUT_LEAD = 0.55;

      function FadingVideo({ src, className, style }) {
        var videoRef = React.useRef(null);
        var rafRef = React.useRef(null);
        var fadingOutRef = React.useRef(false);

        function fadeTo(video, target) {
          cancelAnimationFrame(rafRef.current);
          var start = performance.now();
          var from = parseFloat(video.style.opacity) || 0;
          function step(now) {
            var t = Math.min((now - start) / FADE_MS, 1);
            video.style.opacity = String(from + (target - from) * t);
            if (t < 1) rafRef.current = requestAnimationFrame(step);
          }
          rafRef.current = requestAnimationFrame(step);
        }

        React.useEffect(function() {
          var video = videoRef.current;
          if (!video) return;
          video.style.opacity = '0';

          function onLoaded() {
            video.style.opacity = '0';
            video.play().catch(function() {});
            fadeTo(video, 1);
          }
          function onTimeUpdate() {
            var remaining = video.duration - video.currentTime;
            if (!fadingOutRef.current && video.duration && remaining <= FADE_OUT_LEAD && remaining > 0) {
              fadingOutRef.current = true;
              fadeTo(video, 0);
            }
          }
          function onEnded() {
            video.style.opacity = '0';
            setTimeout(function() {
              video.currentTime = 0;
              video.play().catch(function() {});
              fadingOutRef.current = false;
              fadeTo(video, 1);
            }, 100);
          }

          video.addEventListener('loadeddata', onLoaded);
          video.addEventListener('timeupdate', onTimeUpdate);
          video.addEventListener('ended', onEnded);
          return function() {
            cancelAnimationFrame(rafRef.current);
            video.removeEventListener('loadeddata', onLoaded);
            video.removeEventListener('timeupdate', onTimeUpdate);
            video.removeEventListener('ended', onEnded);
          };
        }, []);

        return (
          <video
            ref={videoRef}
            src={src}
            autoPlay
            muted
            playsInline
            preload="auto"
            className={className}
            style={Object.assign({}, style, { opacity: 0 })}
          />
        );
      }
      window.FadingVideo = FadingVideo;
    })();
  </script>

  <!-- BlurText -->
  <script type="text/babel">
    (function() {
      var motion = window.Motion.motion;

      function BlurText({ text, className }) {
        var words = text.split(' ');
        var _s = React.useState(false);
        var visible = _s[0], setVisible = _s[1];
        var ref = React.useRef(null);

        React.useEffect(function() {
          var el = ref.current;
          if (!el) return;
          var obs = new IntersectionObserver(function(entries) {
            if (entries[0].isIntersecting) setVisible(true);
          }, { threshold: 0.1 });
          obs.observe(el);
          return function() { obs.disconnect(); };
        }, []);

        return (
          <p ref={ref} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
            {words.map(function(word, i) {
              return (
                <motion.span
                  key={i}
                  initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
                  animate={visible ? {
                    filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                    opacity: [0, 0.5, 1],
                    y: [50, -5, 0],
                  } : {}}
                  transition={{ duration: 0.7, times: [0, 0.5, 1], ease: 'easeOut', delay: (i * 100) / 1000 }}
                  style={{ display: 'inline-block', marginRight: '0.28em' }}
                >
                  {word}
                </motion.span>
              );
            })}
          </p>
        );
      }
      window.BlurText = BlurText;
    })();
  </script>
